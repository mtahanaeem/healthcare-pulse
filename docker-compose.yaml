networks:
  healthcare-net:
    driver: bridge

volumes:
  pg_data:
  spark_data:
  n8n_data_volume:

services:
  postgres:
    image: postgres:15
    container_name: healthcare-postgres
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-health_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health_admin} -d ${POSTGRES_DB:-healthcare_warehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-master:
    image: apache/spark:3.5.4
    container_name: healthcare-spark-master
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "8080:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_DRIVER_MEMORY: 6g
    volumes:
      - spark_data:/spark-data
      - ./spark:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker:
    image: apache/spark:3.5.4
    container_name: healthcare-spark-worker
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "8081:8081"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_WORKER_PORT: 8888
      SPARK_WORKER_MEMORY: 6g
      SPARK_WORKER_CORES: 4
    volumes:
      - spark_data:/spark-data
      - ./spark:/opt/spark/jobs
      - ./data:/opt/spark/data
    depends_on:
      - spark-master

  flask-api:
    build:
      context: ./flask_api
      dockerfile: Dockerfile
    container_name: healthcare-flask-api
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "5000:5000"
    environment:
      FLASK_HOST: ${FLASK_HOST:-0.0.0.0}
      FLASK_PORT: ${FLASK_PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-health_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_key}
      API_KEY: ${API_KEY:-hc-pipeline-api-key-2026}
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      KNIME_EXECUTABLE: ${KNIME_EXECUTABLE:-C:\Program Files\KNIME\knime.exe}
      KNIME_WORKFLOW_PATH: ${KNIME_WORKFLOW_PATH:-knime_workflow/health_cleaning.knwf}
      KNIME_BRIDGE_URL: ${KNIME_BRIDGE_URL:-http://host.docker.internal:9999}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./flask_api:/app
      - ./knime_workflow:/app/knime_workflow
      - ./warehouse:/app/warehouse
      - ./scraping:/app/scraping
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  react-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    depends_on:
      - flask-api

  n8n:
    build:
      context: ./n8n_data
      dockerfile: Dockerfile
    container_name: healthcare-n8n
    restart: unless-stopped
    networks:
      - healthcare-net
    ports:
      - "5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_this_encryption_key}
      N8N_PORT: 5678
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
      N8N_PERSISTENCE_DATA_MAX_SIZE: "10"
      N8N_METRICS: "false"
    volumes:
      - n8n_data_volume:/home/node/.n8n
      - ./n8n_data:/backup
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/healthcare-pipeline
    working_dir: /healthcare-pipeline
